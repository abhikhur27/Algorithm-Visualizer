<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algorithm Visualizer Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header container">
    <a class="back-link" href="https://abhikhur27.github.io/" target="_blank" rel="noreferrer">Back to Portfolio</a>
    <h1>Algorithm Visualizer Lab</h1>
    <p>Interactive sorting simulator with controllable playback, step execution, and operation counters.</p>
  </header>

  <main class="container grid">
    <section class="panel controls-panel">
      <h2>Controls</h2>

      <label>
        Algorithm
        <select id="algorithm-select">
          <option value="bubble">Bubble Sort</option>
          <option value="insertion">Insertion Sort</option>
          <option value="merge">Merge Sort</option>
          <option value="quick">Quick Sort</option>
        </select>
      </label>

      <label>
        Array Size: <span id="size-value">30</span>
        <input id="size-slider" type="range" min="10" max="80" value="30" step="1">
      </label>

      <label>
        Speed (ms/step): <span id="speed-value">80</span>
        <input id="speed-slider" type="range" min="20" max="300" value="80" step="10">
      </label>

      <label>
        Custom Array (comma-separated)
        <input id="custom-array" type="text" placeholder="e.g. 44, 12, 98, 7, 31">
      </label>

      <div class="buttons">
        <button id="apply-array-btn" type="button">Apply Array</button>
        <button id="randomize-btn" type="button">Randomize</button>
        <button id="start-btn" class="primary" type="button">Start</button>
        <button id="pause-btn" type="button">Pause</button>
        <button id="step-btn" type="button">Step</button>
        <button id="reset-btn" type="button">Reset</button>
      </div>

      <p id="status-text" class="status" aria-live="polite">Ready. Generate an array and start sorting.</p>
    </section>

    <section class="panel visual-panel">
      <div class="stats" role="list" aria-label="Algorithm metrics">
        <article role="listitem">
          <h3>Comparisons</h3>
          <p id="comparisons">0</p>
        </article>
        <article role="listitem">
          <h3>Swaps</h3>
          <p id="swaps">0</p>
        </article>
        <article role="listitem">
          <h3>Writes</h3>
          <p id="writes">0</p>
        </article>
        <article role="listitem">
          <h3>Step Progress</h3>
          <p id="step-progress">0 / 0</p>
        </article>
      </div>

      <div class="legend" aria-hidden="true">
        <span><i class="swatch default"></i>Default</span>
        <span><i class="swatch compare"></i>Compare</span>
        <span><i class="swatch swap"></i>Swap/Write</span>
        <span><i class="swatch done"></i>Sorted</span>
      </div>

      <div id="array-container" class="array-container" aria-label="Bar visualization"></div>

      <div class="algo-note" id="algo-note"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
